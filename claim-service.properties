spring.application.name=claim-service
# ===============================
# Server
# ===============================
server.port=8086

# ===============================
# Database (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/InsuranceDataBase?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Disable Spring Cloud Config
# ===============================
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
resilience4j.circuitbreaker.instances.claimDependenciesBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.claimDependenciesBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.claimDependenciesBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.claimDependenciesBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.claimDependenciesBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.claimDependenciesBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
management.endpoints.web.exposure.include=health,info
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
